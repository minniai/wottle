openapi: "3.1.0"
info:
  title: Submit Move (with clock enforcement)
  version: "2.0.0"
  description: >
    Server Action: submitMove(matchId, fromX, fromY, toX, toY)
    Updated contract for 006-match-completion: adds clock expiry rejection
    and move-limit-exceeded rejection paths.

paths:
  /actions/match/submitMove:
    post:
      summary: Submit a tile swap for the current round
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [matchId, fromX, fromY, toX, toY]
              properties:
                matchId:
                  type: string
                  format: uuid
                fromX:
                  type: integer
                  minimum: 0
                  maximum: 9
                fromY:
                  type: integer
                  minimum: 0
                  maximum: 9
                toX:
                  type: integer
                  minimum: 0
                  maximum: 9
                toY:
                  type: integer
                  minimum: 0
                  maximum: 9
      responses:
        "200":
          description: Move accepted and queued for round resolution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveResult"
              examples:
                accepted:
                  summary: Move accepted
                  value:
                    status: accepted
                    roundNumber: 7
        "200-rejected-match-ended":
          description: Match is already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveResult"
              examples:
                matchEnded:
                  summary: Match already ended
                  value:
                    status: rejected
                    error: Match has ended
        "200-rejected-clock-expired":
          description: Player's clock has reached zero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveResult"
              examples:
                clockExpired:
                  summary: Clock expired
                  value:
                    status: rejected
                    error: Your time has expired

components:
  schemas:
    MoveResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, rejected]
        roundNumber:
          type: integer
          description: Present when status is accepted
        error:
          type: string
          description: Human-readable rejection reason (present when status is rejected)
          enum:
            - Match has ended
            - Your time has expired
            - Match not found
            - Not a participant
            - Round not in collecting state
            - Tile is frozen
            - Rate limit exceeded

  # Validation gates applied in order within submitMove():
  # 1. Session / participant check (existing)
  # 2. Rate limit check (existing)
  # 3. Match state check: reject if state = "completed" or "abandoned"  ← NEW
  # 4. Clock expiry check: reject if server-computed remainingMs <= 0   ← NEW
  # 5. Frozen tile check (existing)
  # 6. Insert move_submission record (existing)
  # 7. Fire-and-forget advanceRound() (existing)
