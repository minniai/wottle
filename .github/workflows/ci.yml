name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: 1
  HUSKY: 0
  CI: true
  PNPM_VERSION: 10.28.0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: node:lts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm lint
      - name: Guard service_role usage
        run: pnpm guard:no-service-role

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    container: node:lts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    container: node:lts
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Unit Tests
        run: pnpm test:unit
      - name: Run Integration Tests
        run: pnpm test:integration

  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    # container: node:lts keeps pnpm+Node behaviour identical to lint/typecheck/test.
    # Without this, act runs the job directly in the platform image (no inner container)
    # which causes pnpm install → next build to produce no .next/ output.
    container: node:lts
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js app
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Placeholder values — no live Supabase instance at build time.
          # NEXT_PUBLIC_* vars are inlined into the client bundle by Next.js;
          # the real values are injected at runtime via .env.local in playwright/perf-gate.
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build
      - name: Verify build output
        run: |
          echo "=== .next/ contents ==="
          ls -la .next/ 2>/dev/null || { echo "ERROR: .next/ not found"; exit 1; }
          if [ ! -f .next/BUILD_ID ]; then
            echo "ERROR: .next/BUILD_ID missing — next build failed or wrote to wrong directory"
            echo "Working dir: $(pwd) | GITHUB_WORKSPACE: ${GITHUB_WORKSPACE:-unset}"
            exit 1
          fi
          echo "BUILD_ID: $(cat .next/BUILD_ID)"
      - name: Prune build artifact (remove incremental cache and trace)
        # act does not parse multiline YAML path: blocks — prune here instead
        run: rm -rf .next/cache .next/trace
      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: .next/
          if-no-files-found: error
          retention-days: 1
          # .next/ is a hidden directory (dot-prefix); upload-artifact@v4 skips
          # hidden files by default — include-hidden-files: true is required.
          include-hidden-files: true

  quickstart:
    name: Supabase Quickstart
    runs-on: ubuntu-latest
    # Note: No container here - needs Docker access for Supabase
    # For act: Run with -P ubuntu-latest=node:lts to use Node.js image
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Install Docker CLI (for act compatibility)
        # Only needed when running with act using node:lts platform
        # In GitHub Actions, Docker is available on the runner
        run: |
          if command -v docker &> /dev/null; then
            echo "Docker CLI already available"
            docker --version
            # Ensure lsof is available on the host/runner if possible
            if ! command -v lsof &> /dev/null && command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y lsof
            fi
          else
            # Install Docker CLI and lsof for Debian-based images (node:lts)
            # Try apt-get first (faster), fallback to official installer
            (apt-get update && apt-get install -y docker.io lsof) || \
            (curl -fsSL https://get.docker.com | sh && apt-get install -y lsof) || \
            (echo "Error: Could not install prerequisites" && exit 1)
            docker --version
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0
      - name: Capture CLI version for Docker cache key
        id: supabase-version
        run: echo "version=$(supabase --version)" >> $GITHUB_OUTPUT
      - name: Restore Supabase Docker image cache
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-cache.tar
          key: supabase-docker-${{ runner.os }}-${{ steps.supabase-version.outputs.version }}
      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-docker-cache.tar
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run quickstart automation
        run: |
          pnpm quickstart 2>&1 | tee quickstart-log.ndjson
      - name: Export Supabase Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          docker save \
            $(docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep -E 'supabase|postgres|kong|gotrue|postgrest') \
            -o /tmp/supabase-docker-cache.tar
      - name: Upload quickstart log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-log
          path: quickstart-log.ndjson
          if-no-files-found: warn

  playwright:
    name: Playwright UI (${{ matrix.suite }})
    runs-on: ubuntu-latest
    # Note: No container here - needs Docker access for Supabase
    # For act: Run with -P ubuntu-latest=node:lts to use Node.js image
    needs: build
    strategy:
      fail-fast: false
      matrix:
        suite:
          - baseline
          - playtest
    timeout-minutes: 45
    env:
      APP_PORT: 3000
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      QUICKSTART_DISABLE_STOP: "1"
      RATE_LIMIT_DISABLED_SCOPES: "auth:login"
      RATE_LIMIT_DISABLE_ALL: "1"
      PLAYTEST_SESSION_SECURE: "false"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      # PLAYTEST_PRESENCE_TTL_SECONDS removed - using code default of 300s
    steps:
      - name: Install Docker CLI (for act compatibility)
        # Only needed when running with act using node:lts platform
        # In GitHub Actions, Docker is available on the runner
        run: |
          if command -v docker &> /dev/null; then
            echo "Docker CLI already available"
            docker --version
            # Ensure lsof is available on the host/runner if possible
            if ! command -v lsof &> /dev/null && command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y lsof
            fi
          else
            # Install Docker CLI and lsof for Debian-based images (node:lts)
            # Try apt-get first (faster), fallback to official installer
            (apt-get update && apt-get install -y docker.io lsof) || \
            (curl -fsSL https://get.docker.com | sh && apt-get install -y lsof) || \
            (echo "Error: Could not install prerequisites" && exit 1)
            docker --version
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0
      - name: Capture CLI version for Docker cache key
        id: supabase-version
        run: echo "version=$(supabase --version)" >> $GITHUB_OUTPUT
      - name: Restore Supabase Docker image cache
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-cache.tar
          key: supabase-docker-${{ runner.os }}-${{ steps.supabase-version.outputs.version }}
      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-docker-cache.tar
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Start Supabase stack via quickstart
        run: |
          echo "Working directory: $(pwd)"
          pnpm quickstart 2>&1 | tee quickstart-playwright.ndjson
          # Verify .env.local was created immediately after quickstart
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local was not created by quickstart!"
            echo "Working directory: $(pwd)"
            echo "Files in current directory:"
            ls -la | head -30
            echo "Searching for .env.local in parent directories:"
            find . -maxdepth 3 -name ".env.local" -type f 2>/dev/null || true
            exit 1
          fi
          echo "✓ .env.local created successfully"
          echo "File size: $(wc -c < .env.local) bytes"
      - name: Export Supabase Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          docker save \
            $(docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep -E 'supabase|postgres|kong|gotrue|postgrest') \
            -o /tmp/supabase-docker-cache.tar
      - name: Download Next.js build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: .next/
      - name: Verify build artifact integrity
        run: |
          if [ ! -f .next/BUILD_ID ]; then
            echo "ERROR: .next/BUILD_ID not found — artifact incomplete or download failed"
            ls -la .next/ || echo ".next/ is empty"
            exit 1
          fi
          echo "Build artifact OK. BUILD_ID: $(cat .next/BUILD_ID)"
      - name: Start Next.js server
        run: |
          # Ensure the port is free before starting
          echo "Checking for processes on port ${APP_PORT:-3000}..."
          # Attempt to install psmisc for fuser if missing (best effort, no sudo)
          if ! command -v fuser &> /dev/null && command -v apt-get &> /dev/null; then
            echo "Installing psmisc (fuser)..."
            (apt-get update && apt-get install -y psmisc) || true
          fi

          for i in {1..10}; do
            # 1. Try lsof
            if command -v lsof >/dev/null 2>&1; then
              PIDS=$(lsof -ti :${APP_PORT:-3000} 2>/dev/null || true)
              if [ -n "$PIDS" ]; then
                echo "Found with lsof: $PIDS. Killing..."
                echo "$PIDS" | xargs kill -9 || true
              fi
            fi
            
            # 2. Try fuser (more robust)
            if command -v fuser >/dev/null 2>&1; then
              fuser -k -n tcp ${APP_PORT:-3000} >/dev/null 2>&1 || true
            fi
            
            # 3. Try ss (fallback if lsof/fuser missing but ss present - confirmed in logs)
            if command -v ss >/dev/null 2>&1; then
               # ss output format: ... users:(("node",pid=123,fd=4)) ...
               PIDS=$(ss -lptn "sport = :${APP_PORT:-3000}" | grep -o 'pid=[0-9]*' | cut -d= -f2 | sort -u || true)
               if [ -n "$PIDS" ]; then
                 echo "Found with ss: $PIDS. Killing..."
                 echo "$PIDS" | xargs kill -9 || true
               fi
            fi

            # 3. Check if port is clear
            if ! curl -s --connect-timeout 1 http://127.0.0.1:${APP_PORT:-3000} >/dev/null 2>&1; then
               echo "Port ${APP_PORT:-3000} is free."
               break
            fi

            echo "Port ${APP_PORT:-3000} is still accessible (phantom process). Waiting..."
            
            # Debugging phantom process on last attempt
            if [ "$i" -eq 10 ]; then
               echo "=== NETWORK DEBUG INFO ==="
               echo "Active Listeners (ss):"
               ss -lptn || true
               echo "Active Listeners (netstat):"
               netstat -tulpn || true
               echo "Curl Headers:"
               curl -v --connect-timeout 2 http://127.0.0.1:${APP_PORT:-3000} || true
               echo "=========================="
               echo "ERROR: Unable to clear port ${APP_PORT:-3000}. Exiting to avoid EADDRINUSE."
               exit 1
            fi
            sleep 2
          done
          # Verify .env.local exists and load environment variables
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local not found! Server will fail without Supabase credentials"
            echo "Expected .env.local to be created by quickstart step"
            exit 1
          fi
          # Load environment variables
          set -a
          source .env.local
          set +a
          # Start the server directly with proper signal handling
          # Use setsid to create a new session and prevent zombie processes
          echo "Starting server with CI=${CI} and PLAYTEST_SESSION_SECURE=${PLAYTEST_SESSION_SECURE}"
          echo "Supabase URL (.env.local): ${NEXT_PUBLIC_SUPABASE_URL:-NOT_SET}"
          echo "Supabase URL override (ACT_SUPABASE_URL_OVERRIDE): ${ACT_SUPABASE_URL_OVERRIDE:-NOT_SET}"
          echo "Service Role Key present: ${SUPABASE_SERVICE_ROLE_KEY:+yes}"
          # Export all required env vars explicitly - setsid/bash -c may not inherit them in act/Docker
          # Supabase vars are loaded from .env.local, CI vars from workflow env
          # Override Supabase URL if ACT_SUPABASE_URL_OVERRIDE is set (for act/Docker networking)
          setsid bash -c "export CI=${CI}; \
            export PLAYTEST_SESSION_SECURE=${PLAYTEST_SESSION_SECURE}; \
            [ -n \"\${ACT_SUPABASE_URL_OVERRIDE}\" ] && export NEXT_PUBLIC_SUPABASE_URL=\"\${ACT_SUPABASE_URL_OVERRIDE}\" || export NEXT_PUBLIC_SUPABASE_URL='${NEXT_PUBLIC_SUPABASE_URL}'; \
            export NEXT_PUBLIC_SUPABASE_ANON_KEY='${NEXT_PUBLIC_SUPABASE_ANON_KEY}'; \
            export SUPABASE_ANON_KEY='${SUPABASE_ANON_KEY}'; \
            export SUPABASE_SERVICE_ROLE_KEY='${SUPABASE_SERVICE_ROLE_KEY}'; \
            echo \$\$ > .next-pid; \
            exec pnpm start --hostname 0.0.0.0 --port ${APP_PORT:-3000}" < /dev/null > next.log 2>&1 &
          # Wait for server to initialize
          sleep 5
          # Check process state
          if [ ! -f .next-pid ]; then
            echo "ERROR: .next-pid file not created"
            exit 1
          fi
          SERVER_PID=$(cat .next-pid)
          echo "Started server with PID: $SERVER_PID"

          PROC_STATE=$(ps -o state= -p $SERVER_PID 2>/dev/null | tr -d ' ' || echo "")
          if [ -z "$PROC_STATE" ]; then
            echo "ERROR: Server process $SERVER_PID not found"
            echo "=== Server log ==="
            cat next.log
            exit 1
          fi
          if [ "$PROC_STATE" = "Z" ]; then
            echo "ERROR: Server process $SERVER_PID is a zombie (defunct)"
            echo "=== Server log ==="
            cat next.log
            exit 1
          fi
          echo "Server process $SERVER_PID is running (state: $PROC_STATE)"
          # Find the actual Node.js process (pnpm spawns node)
          NODE_PID=$(pgrep -P $SERVER_PID 2>/dev/null | head -1 || pgrep -f "next.*start" 2>/dev/null | head -1 || echo "")
          if [ -n "$NODE_PID" ] && [ "$NODE_PID" != "$SERVER_PID" ]; then
            echo "Found Node.js process: $NODE_PID"
            echo $NODE_PID > .next-node-pid
            NODE_STATE=$(ps -o state= -p $NODE_PID 2>/dev/null | tr -d ' ' || echo "")
            if [ "$NODE_STATE" = "Z" ]; then
              echo "ERROR: Node.js process $NODE_PID is a zombie"
              exit 1
            fi
          fi
      - name: Ensure Supabase bootstrap is running
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          QUICKSTART_DISABLE_STOP: "1"
        run: |
          if ! supabase status > /dev/null 2>&1; then
            pnpm quickstart 2>&1 | tee -a quickstart-playwright.ndjson
          fi
      - name: Wait for Next.js
        run: |
          echo "Waiting for Next.js server to be ready..."
          echo "Checking server logs..."
          tail -30 next.log || true
          echo ""
          cat .next-pid || true
          echo ""
          if [ -f .next-pid ]; then
            PID=$(cat .next-pid)
            if kill -0 $PID 2>/dev/null; then
              echo "Server process $PID is running"
              ps aux | grep -E "^[^ ]+ +$PID " | grep -v grep || true
            else
              echo "ERROR: Server process $PID is NOT running!"
              echo "=== Full server log ==="
              cat next.log
              exit 1
            fi
          else
            echo "ERROR: .next-pid file not found!"
            exit 1
          fi
          echo ""
          echo "=== Testing server connection ==="
          # Try multiple methods to test connectivity
          for url in "http://127.0.0.1:${APP_PORT:-3000}" "http://localhost:${APP_PORT:-3000}" "http://0.0.0.0:${APP_PORT:-3000}"; do
            echo "Testing $url..."
            if command -v curl &> /dev/null; then
              if curl -f -s -o /dev/null --max-time 2 "$url" 2>&1; then
                echo "✓ $url is accessible via curl"
                break
              else
                echo "✗ $url not accessible via curl"
              fi
            elif command -v wget &> /dev/null; then
              if wget -q -O /dev/null --timeout=2 "$url" 2>&1; then
                echo "✓ $url is accessible via wget"
                break
              else
                echo "✗ $url not accessible via wget"
              fi
            else
              echo "curl/wget not available, skipping connection test"
            fi
          done
          echo ""
          echo "=== Using wait-on to verify server ==="
          pnpm exec wait-on "http://127.0.0.1:${APP_PORT:-3000}" --timeout 60000 --interval 1000 || {
            echo "=== wait-on failed ==="
            echo "=== Full server log ==="
            cat next.log
            echo "=== Process status ==="
            if [ -f .next-pid ]; then
              PID=$(cat .next-pid)
              ps aux | grep -E "(^[^ ]+ +$PID |node|next)" | grep -v grep || true
            fi
            exit 1
          }
          echo "✓ Server is ready!"
      - name: Run Playwright tests
        env:
          PLAYWRIGHT_SUITE: ${{ matrix.suite }}
        run: |
          if [ "$PLAYWRIGHT_SUITE" = "playtest" ]; then
            if grep -R --include='*.spec.ts' -q '@two-player-playtest' tests; then
              pnpm exec playwright test --config=playwright.config.ts --project=playtest-firefox --reporter=line --workers=1 --grep "@two-player-playtest"
            else
              echo "Skipping playtest suite: no '@two-player-playtest' tests found yet."
            fi
          else
            pnpm exec playwright test --config=playwright.config.ts --project=chromium --reporter=line --grep-invert "@two-player-playtest"
          fi
      - name: Stop Next.js server
        if: always()
        run: |
          # Dump logs if we are in a failure state or for debugging
          if [ -f next.log ]; then
            echo "=== Next.js Server Log Summary ==="
            echo "--> Secure Cookie Logic:"
            grep "shouldUseSecureCookies" next.log || echo "No secure cookie logs found"
            echo "--> Errors:"
            grep -i "error" next.log | grep -v "React Router" || echo "No errors found"
            echo "--> Last 100 lines:"
            tail -n 100 next.log
            echo "==========================="
          else
             echo "next.log not found"
          fi

          if [ -f .next-pid ]; then
            PID=$(cat .next-pid)
            echo "Stopping server process $PID"
            kill $PID 2>/dev/null || true
            rm .next-pid
          fi
          if [ -f .next-node-pid ]; then
            NODE_PID=$(cat .next-node-pid)
            kill $NODE_PID 2>/dev/null || true
            rm .next-node-pid
          fi
          # Targeted kill of any remaining server on this port
          if command -v lsof &> /dev/null; then
            lsof -ti :${APP_PORT:-3000} | xargs kill -9 2>/dev/null || true
          fi
          pkill -f "next.*start.*${APP_PORT:-3000}" 2>/dev/null || true
      - name: Stop Supabase stack
        if: always()
        run: supabase stop || true
      - name: Upload Playwright log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-playwright-${{ matrix.suite }}-log
          path: quickstart-playwright.ndjson
          if-no-files-found: warn

  perf-gate:
    name: Perf Gate (Artillery)
    runs-on: ubuntu-latest
    # Note: No container here - needs Docker access for Supabase
    # For act: Run with -P ubuntu-latest=node:lts to use Node.js image
    needs: build
    timeout-minutes: 45
    env:
      APP_PORT: 3000
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      QUICKSTART_DISABLE_STOP: "1"
    steps:
      - name: Install Docker CLI (for act compatibility)
        # Only needed when running with act using node:lts platform
        # In GitHub Actions, Docker is available on the runner
        run: |
          if command -v docker &> /dev/null; then
            echo "Docker CLI already available"
            docker --version
          else
            # Install Docker CLI for Debian-based images (node:lts)
            # Try apt-get first (faster), fallback to official installer
            (apt-get update && apt-get install -y docker.io) || \
            (curl -fsSL https://get.docker.com | sh) || \
            (echo "Error: Could not install Docker CLI" && exit 1)
            docker --version
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0
      - name: Capture CLI version for Docker cache key
        id: supabase-version
        run: echo "version=$(supabase --version)" >> $GITHUB_OUTPUT
      - name: Restore Supabase Docker image cache
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-cache.tar
          key: supabase-docker-${{ runner.os }}-${{ steps.supabase-version.outputs.version }}
      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-docker-cache.tar
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start Supabase stack via quickstart
        run: |
          echo "Working directory: $(pwd)"
          pnpm quickstart 2>&1 | tee quickstart-perf.ndjson
          # Verify .env.local was created immediately after quickstart
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local was not created by quickstart!"
            echo "Working directory: $(pwd)"
            echo "Files in current directory:"
            ls -la | head -30
            echo "Searching for .env.local in parent directories:"
            find . -maxdepth 3 -name ".env.local" -type f 2>/dev/null || true
            exit 1
          fi
          echo "✓ .env.local created successfully"
          echo "File size: $(wc -c < .env.local) bytes"
      - name: Export Supabase Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          docker save \
            $(docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep -E 'supabase|postgres|kong|gotrue|postgrest') \
            -o /tmp/supabase-docker-cache.tar
      - name: Download Next.js build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: .next/
      - name: Verify build artifact integrity
        run: |
          if [ ! -f .next/BUILD_ID ]; then
            echo "ERROR: .next/BUILD_ID not found — artifact incomplete or download failed"
            ls -la .next/ || echo ".next/ is empty"
            exit 1
          fi
          echo "Build artifact OK. BUILD_ID: $(cat .next/BUILD_ID)"
      - name: Start Next.js server
        run: |
          # Verify .env.local exists and load environment variables
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local not found! Server will fail without Supabase credentials"
            echo "Expected .env.local to be created by quickstart step"
            echo "Working directory: $(pwd)"
            ls -la | head -30
            exit 1
          fi
          # Ensure the port is free before starting
          echo "Checking for processes on port ${APP_PORT:-3000}..."
          # Attempt to install psmisc for fuser if missing (best effort)
          # Attempt to install psmisc for fuser if missing (best effort, no sudo)
          if ! command -v fuser &> /dev/null && command -v apt-get &> /dev/null; then
            echo "Installing psmisc (fuser)..."
            (apt-get update && apt-get install -y psmisc) || true
          fi

          for i in {1..10}; do
            # 1. Try lsof
            if command -v lsof >/dev/null 2>&1; then
              PIDS=$(lsof -ti :${APP_PORT:-3000} 2>/dev/null || true)
              if [ -n "$PIDS" ]; then
                echo "Found with lsof: $PIDS. Killing..."
                echo "$PIDS" | xargs kill -9 || true
              fi
            fi
            
            # 2. Try fuser (more robust)
            if command -v fuser >/dev/null 2>&1; then
              fuser -k -n tcp ${APP_PORT:-3000} >/dev/null 2>&1 || true
            fi
            
            # 3. Try ss (fallback if lsof/fuser missing but ss present)
            if command -v ss >/dev/null 2>&1; then
               # ss output format: ... users:(("node",pid=123,fd=4)) ...
               PIDS=$(ss -lptn "sport = :${APP_PORT:-3000}" | grep -o 'pid=[0-9]*' | cut -d= -f2 | sort -u || true)
               if [ -n "$PIDS" ]; then
                 echo "Found with ss: $PIDS. Killing..."
                 echo "$PIDS" | xargs kill -9 || true
               fi
            fi

            # 3. Check if port is clear
            if ! curl -s --connect-timeout 1 http://127.0.0.1:${APP_PORT:-3000} >/dev/null 2>&1; then
               echo "Port ${APP_PORT:-3000} is free."
               break
            fi

            echo "Port ${APP_PORT:-3000} is still accessible (phantom process). Waiting..."
            
            # Debugging phantom process on last attempt
            if [ "$i" -eq 10 ]; then
               echo "=== NETWORK DEBUG INFO ==="
               echo "Active Listeners (ss):"
               ss -lptn || true
               echo "Active Listeners (netstat):"
               netstat -tulpn || true
               echo "Curl Headers:"
               curl -v --connect-timeout 2 http://127.0.0.1:${APP_PORT:-3000} || true
               echo "=========================="
               echo "ERROR: Unable to clear port ${APP_PORT:-3000}. Exiting to avoid EADDRINUSE."
               exit 1
            fi
            sleep 2
          done
          # Load environment variables
          set -a
          source .env.local
          set +a
          # Start the server directly with proper signal handling
          # Use setsid to create a new session and prevent zombie processes
          setsid bash -c "[ -n \"\${ACT_SUPABASE_URL_OVERRIDE}\" ] && export NEXT_PUBLIC_SUPABASE_URL=\"\${ACT_SUPABASE_URL_OVERRIDE}\"; echo \$\$ > .perf-next-pid; exec pnpm start --hostname 0.0.0.0 --port ${APP_PORT:-3000}" < /dev/null > perf-next.log 2>&1 &
          # Wait for server to initialize
          sleep 5
          # Check process state
          if [ ! -f .perf-next-pid ]; then
            echo "ERROR: .perf-next-pid file not created"
            exit 1
          fi
          SERVER_PID=$(cat .perf-next-pid)
          echo "Started server with PID: $SERVER_PID"

          PROC_STATE=$(ps -o state= -p $SERVER_PID 2>/dev/null | tr -d ' ' || echo "")
          echo "Server process state: $PROC_STATE"
          if [ -z "$PROC_STATE" ]; then
            echo "ERROR: Server process $SERVER_PID not found"
            echo "=== Server log ==="
            cat perf-next.log
            exit 1
          fi
          if [ "$PROC_STATE" = "Z" ]; then
            echo "ERROR: Server process $SERVER_PID is a zombie (defunct)"
            echo "=== Server log ==="
            cat perf-next.log
            exit 1
          fi
          echo "Server process $SERVER_PID is running (state: $PROC_STATE)"
          # Find the actual Node.js process (pnpm spawns node)
          NODE_PID=$(pgrep -P $SERVER_PID 2>/dev/null | head -1 || pgrep -f "next.*start" 2>/dev/null | head -1 || echo "")
          if [ -n "$NODE_PID" ] && [ "$NODE_PID" != "$SERVER_PID" ]; then
            echo "Found Node.js process: $NODE_PID"
            echo $NODE_PID > .perf-next-node-pid
            NODE_STATE=$(ps -o state= -p $NODE_PID 2>/dev/null | tr -d ' ' || echo "")
            if [ "$NODE_STATE" = "Z" ]; then
              echo "ERROR: Node.js process $NODE_PID is a zombie"
              exit 1
            fi
          fi
      - name: Ensure Supabase bootstrap is running
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          QUICKSTART_DISABLE_STOP: "1"
        run: |
          if ! supabase status > /dev/null 2>&1; then
            pnpm quickstart 2>&1 | tee -a quickstart-perf.ndjson
          fi
      - name: Wait for Next.js
        run: |
          echo "Waiting for Next.js server to be ready..."
          echo "Checking server logs..."
          tail -30 perf-next.log || true
          echo ""
          echo "=== Checking if server process is still running ==="
          if [ -f .perf-next-pid ]; then
            PID=$(cat .perf-next-pid)
            if kill -0 $PID 2>/dev/null; then
              echo "Server process $PID is running"
              ps aux | grep -E "^[^ ]+ +$PID " | grep -v grep || true
            else
              echo "ERROR: Server process $PID is NOT running!"
              echo "=== Full server log ==="
              cat perf-next.log
              exit 1
            fi
          else
            echo "ERROR: .perf-next-pid file not found!"
            exit 1
          fi
          echo ""
          echo "=== Testing server connection ==="
          # Try multiple methods to test connectivity
          for url in "http://127.0.0.1:${APP_PORT:-3000}" "http://localhost:${APP_PORT:-3000}" "http://0.0.0.0:${APP_PORT:-3000}"; do
            echo "Testing $url..."
            if command -v curl &> /dev/null; then
              if curl -f -s -o /dev/null --max-time 2 "$url" 2>&1; then
                echo "✓ $url is accessible via curl"
                break
              else
                echo "✗ $url not accessible via curl"
              fi
            elif command -v wget &> /dev/null; then
              if wget -q -O /dev/null --timeout=2 "$url" 2>&1; then
                echo "✓ $url is accessible via wget"
                break
              else
                echo "✗ $url not accessible via wget"
              fi
            else
              echo "curl/wget not available, skipping connection test"
            fi
          done
          echo ""
          echo "=== Using wait-on to verify server ==="
          pnpm exec wait-on "http://127.0.0.1:${APP_PORT:-3000}" --timeout 60000 --interval 1000 || {
            echo "=== wait-on failed ==="
            echo "=== Full server log ==="
            cat perf-next.log
            echo "=== Process status ==="
            if [ -f .perf-next-pid ]; then
              PID=$(cat .perf-next-pid)
              ps aux | grep -E "(^[^ ]+ +$PID |node|next)" | grep -v grep || true
            fi
            exit 1
          }
          echo "✓ Server is ready!"
      - name: Run Artillery scenario
        run: pnpm exec artillery run --target "http://127.0.0.1:${APP_PORT:-3000}" --output artillery-swap.json tests/perf/swap.yml
      - name: Assert swap latency thresholds
        run: pnpm exec tsx scripts/perf/assert-artillery-thresholds.ts artillery-swap.json
      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f .perf-next-pid ]; then
            kill $(cat .perf-next-pid) || true
            rm .perf-next-pid
          fi
      - name: Stop Supabase stack
        if: always()
        run: supabase stop || true
      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts
          path: |
            quickstart-perf.ndjson
            perf-next.log
            artillery-swap.json
          if-no-files-found: warn
