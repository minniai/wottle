name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: 1
  HUSKY: 0
  CI: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: node:lts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile false
      - name: Run ESLint
        run: pnpm lint
      - name: Guard service_role usage
        run: pnpm guard:no-service-role

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    container: node:lts
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile false
      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container: node:lts
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile false
      - name: Run Unit Tests
        run: pnpm test -- --run

  quickstart:
    name: Supabase Quickstart
    runs-on: ubuntu-latest
    # Note: No container here - needs Docker access for Supabase
    # For act: Run with -P ubuntu-latest=node:lts to use Node.js image
    needs: test
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Install Docker CLI (for act compatibility)
        # Only needed when running with act using node:lts platform
        # In GitHub Actions, Docker is available on the runner
        run: |
          if command -v docker &> /dev/null; then
            echo "Docker CLI already available"
            docker --version
          else
            # Install Docker CLI for Debian-based images (node:lts)
            # Try apt-get first (faster), fallback to official installer
            (apt-get update && apt-get install -y docker.io) || \
            (curl -fsSL https://get.docker.com | sh) || \
            (echo "Error: Could not install Docker CLI" && exit 1)
            docker --version
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile false
      - name: Run quickstart automation
        run: |
          pnpm quickstart 2>&1 | tee quickstart-log.ndjson
      - name: Upload quickstart log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-log
          path: quickstart-log.ndjson
          if-no-files-found: warn

  playwright:
    name: Playwright UI (${{ matrix.suite }})
    runs-on: ubuntu-latest
    # Note: No container here - needs Docker access for Supabase
    # For act: Run with -P ubuntu-latest=node:lts to use Node.js image
    needs: quickstart
    strategy:
      fail-fast: false
      matrix:
        suite:
          - baseline
          - playtest
    timeout-minutes: 45
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      QUICKSTART_DISABLE_STOP: "1"
      PLAYTEST_PRESENCE_TTL_SECONDS: "3"
    steps:
      - name: Install Docker CLI (for act compatibility)
        # Only needed when running with act using node:lts platform
        # In GitHub Actions, Docker is available on the runner
        run: |
          if command -v docker &> /dev/null; then
            echo "Docker CLI already available"
            docker --version
          else
            # Install Docker CLI for Debian-based images (node:lts)
            # Try apt-get first (faster), fallback to official installer
            (apt-get update && apt-get install -y docker.io) || \
            (curl -fsSL https://get.docker.com | sh) || \
            (echo "Error: Could not install Docker CLI" && exit 1)
            docker --version
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile false
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Start Supabase stack via quickstart
        run: |
          echo "Working directory: $(pwd)"
          pnpm quickstart 2>&1 | tee quickstart-playwright.ndjson
          # Verify .env.local was created immediately after quickstart
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local was not created by quickstart!"
            echo "Working directory: $(pwd)"
            echo "Files in current directory:"
            ls -la | head -30
            echo "Searching for .env.local in parent directories:"
            find . -maxdepth 3 -name ".env.local" -type f 2>/dev/null || true
            exit 1
          fi
          echo "✓ .env.local created successfully"
          echo "File size: $(wc -c < .env.local) bytes"
      - name: Build Next.js app
        run: pnpm build
      - name: Start Next.js server
        run: |
          # Verify .env.local exists and load environment variables
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local not found! Server will fail without Supabase credentials"
            echo "Expected .env.local to be created by quickstart step"
            exit 1
          fi
          # Load environment variables
          set -a
          source .env.local
          set +a
          # Start the server directly with proper signal handling
          # Use setsid to create a new session and prevent zombie processes
          setsid bash -c "exec pnpm start --hostname 0.0.0.0 --port 3000" < /dev/null > next.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > .next-pid
          echo "Started server with PID: $SERVER_PID"
          # Wait for server to initialize
          sleep 5
          # Check process state - must check state, not just kill -0 (which works on zombies)
          PROC_STATE=$(ps -o state= -p $SERVER_PID 2>/dev/null | tr -d ' ' || echo "")
          if [ -z "$PROC_STATE" ]; then
            echo "ERROR: Server process $SERVER_PID not found"
            echo "=== Server log ==="
            cat next.log
            exit 1
          fi
          if [ "$PROC_STATE" = "Z" ]; then
            echo "ERROR: Server process $SERVER_PID is a zombie (defunct)"
            echo "=== Server log ==="
            cat next.log
            exit 1
          fi
          echo "Server process $SERVER_PID is running (state: $PROC_STATE)"
          # Find the actual Node.js process (pnpm spawns node)
          NODE_PID=$(pgrep -P $SERVER_PID 2>/dev/null | head -1 || pgrep -f "next.*start" 2>/dev/null | head -1 || echo "")
          if [ -n "$NODE_PID" ] && [ "$NODE_PID" != "$SERVER_PID" ]; then
            echo "Found Node.js process: $NODE_PID"
            echo $NODE_PID > .next-node-pid
            NODE_STATE=$(ps -o state= -p $NODE_PID 2>/dev/null | tr -d ' ' || echo "")
            if [ "$NODE_STATE" = "Z" ]; then
              echo "ERROR: Node.js process $NODE_PID is a zombie"
              exit 1
            fi
          fi
      - name: Ensure Supabase bootstrap is running
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          QUICKSTART_DISABLE_STOP: "1"
        run: |
          if ! supabase status > /dev/null 2>&1; then
            pnpm quickstart 2>&1 | tee -a quickstart-playwright.ndjson
          fi
      - name: Wait for Next.js
        run: |
          echo "Waiting for Next.js server to be ready..."
          echo "Checking server logs..."
          tail -30 next.log || true
          echo ""
          echo "=== Checking if server process is still running ==="
          if [ -f .next-pid ]; then
            PID=$(cat .next-pid)
            if kill -0 $PID 2>/dev/null; then
              echo "Server process $PID is running"
              ps aux | grep -E "^[^ ]+ +$PID " | grep -v grep || true
            else
              echo "ERROR: Server process $PID is NOT running!"
              echo "=== Full server log ==="
              cat next.log
              exit 1
            fi
          else
            echo "ERROR: .next-pid file not found!"
            exit 1
          fi
          echo ""
          echo "=== Testing server connection ==="
          # Try multiple methods to test connectivity
          for url in http://127.0.0.1:3000 http://localhost:3000 http://0.0.0.0:3000; do
            echo "Testing $url..."
            if command -v curl &> /dev/null; then
              if curl -f -s -o /dev/null --max-time 2 "$url" 2>&1; then
                echo "✓ $url is accessible via curl"
                break
              else
                echo "✗ $url not accessible via curl"
              fi
            elif command -v wget &> /dev/null; then
              if wget -q -O /dev/null --timeout=2 "$url" 2>&1; then
                echo "✓ $url is accessible via wget"
                break
              else
                echo "✗ $url not accessible via wget"
              fi
            else
              echo "curl/wget not available, skipping connection test"
            fi
          done
          echo ""
          echo "=== Using wait-on to verify server ==="
          pnpm exec wait-on http://127.0.0.1:3000 --timeout 60000 --interval 1000 || {
            echo "=== wait-on failed ==="
            echo "=== Full server log ==="
            cat next.log
            echo "=== Process status ==="
            if [ -f .next-pid ]; then
              PID=$(cat .next-pid)
              ps aux | grep -E "(^[^ ]+ +$PID |node|next)" | grep -v grep || true
            fi
            exit 1
          }
          echo "✓ Server is ready!"
      - name: Run Playwright tests
        env:
          PLAYWRIGHT_SUITE: ${{ matrix.suite }}
        run: |
          if [ "$PLAYWRIGHT_SUITE" = "playtest" ]; then
            if grep -R --include='*.spec.ts' -q '@two-player-playtest' tests; then
              pnpm exec playwright test --config=playwright.config.ts --reporter=line --grep "@two-player-playtest"
            else
              echo "Skipping playtest suite: no '@two-player-playtest' tests found yet."
            fi
          else
            pnpm exec playwright test --config=playwright.config.ts --reporter=line --grep-invert "@two-player-playtest"
          fi
      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f .next-pid ]; then
            PID=$(cat .next-pid)
            echo "Stopping server process $PID"
            kill $PID 2>/dev/null || true
            # Also try to kill the Node process if we tracked it
            if [ -f .next-node-pid ]; then
              NODE_PID=$(cat .next-node-pid)
              kill $NODE_PID 2>/dev/null || true
              rm .next-node-pid
            fi
            # Kill any remaining next/node processes
            pkill -f "next.*start" 2>/dev/null || true
            rm .next-pid
          fi
      - name: Stop Supabase stack
        if: always()
        run: supabase stop || true
      - name: Upload Playwright log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-playwright-${{ matrix.suite }}-log
          path: quickstart-playwright.ndjson
          if-no-files-found: warn

  perf-gate:
    name: Perf Gate (Artillery)
    runs-on: ubuntu-latest
    # Note: No container here - needs Docker access for Supabase
    # For act: Run with -P ubuntu-latest=node:lts to use Node.js image
    needs: playwright
    timeout-minutes: 45
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      QUICKSTART_DISABLE_STOP: "1"
    steps:
      - name: Install Docker CLI (for act compatibility)
        # Only needed when running with act using node:lts platform
        # In GitHub Actions, Docker is available on the runner
        run: |
          if command -v docker &> /dev/null; then
            echo "Docker CLI already available"
            docker --version
          else
            # Install Docker CLI for Debian-based images (node:lts)
            # Try apt-get first (faster), fallback to official installer
            (apt-get update && apt-get install -y docker.io) || \
            (curl -fsSL https://get.docker.com | sh) || \
            (echo "Error: Could not install Docker CLI" && exit 1)
            docker --version
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile false
      - name: Start Supabase stack via quickstart
        run: |
          echo "Working directory: $(pwd)"
          pnpm quickstart 2>&1 | tee quickstart-perf.ndjson
          # Verify .env.local was created immediately after quickstart
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local was not created by quickstart!"
            echo "Working directory: $(pwd)"
            echo "Files in current directory:"
            ls -la | head -30
            echo "Searching for .env.local in parent directories:"
            find . -maxdepth 3 -name ".env.local" -type f 2>/dev/null || true
            exit 1
          fi
          echo "✓ .env.local created successfully"
          echo "File size: $(wc -c < .env.local) bytes"
      - name: Build Next.js app
        run: pnpm build
      - name: Start Next.js server
        run: |
          # Verify .env.local exists and load environment variables
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local not found! Server will fail without Supabase credentials"
            echo "Expected .env.local to be created by quickstart step"
            echo "Working directory: $(pwd)"
            ls -la | head -30
            exit 1
          fi
          # Load environment variables
          set -a
          source .env.local
          set +a
          # Start the server directly with proper signal handling
          # Use setsid to create a new session and prevent zombie processes
          setsid bash -c "exec pnpm start --hostname 0.0.0.0 --port 3000" < /dev/null > perf-next.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > .perf-next-pid
          echo "Started server with PID: $SERVER_PID"
          # Wait for server to initialize
          sleep 5
          # Check process state - must check state, not just kill -0 (which works on zombies)
          PROC_STATE=$(ps -o state= -p $SERVER_PID 2>/dev/null | tr -d ' ' || echo "")
          if [ -z "$PROC_STATE" ]; then
            echo "ERROR: Server process $SERVER_PID not found"
            echo "=== Server log ==="
            cat perf-next.log
            exit 1
          fi
          if [ "$PROC_STATE" = "Z" ]; then
            echo "ERROR: Server process $SERVER_PID is a zombie (defunct)"
            echo "=== Server log ==="
            cat perf-next.log
            exit 1
          fi
          echo "Server process $SERVER_PID is running (state: $PROC_STATE)"
          # Find the actual Node.js process (pnpm spawns node)
          NODE_PID=$(pgrep -P $SERVER_PID 2>/dev/null | head -1 || pgrep -f "next.*start" 2>/dev/null | head -1 || echo "")
          if [ -n "$NODE_PID" ] && [ "$NODE_PID" != "$SERVER_PID" ]; then
            echo "Found Node.js process: $NODE_PID"
            echo $NODE_PID > .perf-next-node-pid
            NODE_STATE=$(ps -o state= -p $NODE_PID 2>/dev/null | tr -d ' ' || echo "")
            if [ "$NODE_STATE" = "Z" ]; then
              echo "ERROR: Node.js process $NODE_PID is a zombie"
              exit 1
            fi
          fi
      - name: Ensure Supabase bootstrap is running
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          QUICKSTART_DISABLE_STOP: "1"
        run: |
          if ! supabase status > /dev/null 2>&1; then
            pnpm quickstart 2>&1 | tee -a quickstart-perf.ndjson
          fi
      - name: Wait for Next.js
        run: |
          echo "Waiting for Next.js server to be ready..."
          echo "Checking server logs..."
          tail -30 perf-next.log || true
          echo ""
          echo "=== Checking if server process is still running ==="
          if [ -f .perf-next-pid ]; then
            PID=$(cat .perf-next-pid)
            if kill -0 $PID 2>/dev/null; then
              echo "Server process $PID is running"
              ps aux | grep -E "^[^ ]+ +$PID " | grep -v grep || true
            else
              echo "ERROR: Server process $PID is NOT running!"
              echo "=== Full server log ==="
              cat perf-next.log
              exit 1
            fi
          else
            echo "ERROR: .perf-next-pid file not found!"
            exit 1
          fi
          echo ""
          echo "=== Testing server connection ==="
          # Try multiple methods to test connectivity
          for url in http://127.0.0.1:3000 http://localhost:3000 http://0.0.0.0:3000; do
            echo "Testing $url..."
            if command -v curl &> /dev/null; then
              if curl -f -s -o /dev/null --max-time 2 "$url" 2>&1; then
                echo "✓ $url is accessible via curl"
                break
              else
                echo "✗ $url not accessible via curl"
              fi
            elif command -v wget &> /dev/null; then
              if wget -q -O /dev/null --timeout=2 "$url" 2>&1; then
                echo "✓ $url is accessible via wget"
                break
              else
                echo "✗ $url not accessible via wget"
              fi
            else
              echo "curl/wget not available, skipping connection test"
            fi
          done
          echo ""
          echo "=== Using wait-on to verify server ==="
          pnpm exec wait-on http://127.0.0.1:3000 --timeout 60000 --interval 1000 || {
            echo "=== wait-on failed ==="
            echo "=== Full server log ==="
            cat perf-next.log
            echo "=== Process status ==="
            if [ -f .perf-next-pid ]; then
              PID=$(cat .perf-next-pid)
              ps aux | grep -E "(^[^ ]+ +$PID |node|next)" | grep -v grep || true
            fi
            exit 1
          }
          echo "✓ Server is ready!"
      - name: Run Artillery scenario
        run: pnpm exec artillery run --output artillery-swap.json tests/perf/swap.yml
      - name: Assert swap latency thresholds
        run: pnpm exec tsx scripts/perf/assert-artillery-thresholds.ts artillery-swap.json
      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f .perf-next-pid ]; then
            kill $(cat .perf-next-pid) || true
            rm .perf-next-pid
          fi
      - name: Stop Supabase stack
        if: always()
        run: supabase stop || true
      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts
          path: |
            quickstart-perf.ndjson
            perf-next.log
            artillery-swap.json
          if-no-files-found: warn
